<text x="728" y="218" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#2563eb">1</text>
<text x="772" y="192" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="850" fill="#172033">Multi-tool coordination</text>
<text x="772" y="220" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">Agents must select tools, order them, and pass intermediate results</text>
<text x="772" y="240" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">while preserving user-specific constraints.</text>
<rect x="680" y="295" width="540" height="118" rx="24" fill="#ffffff" stroke="#e4e7ec" filter="url(#shadow)"/>
<circle cx="728" cy="354" r="28" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="728" y="363" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#2563eb">2</text>
<text x="772" y="337" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="850" fill="#172033">Missing-constraint inference</text>
<text x="772" y="365" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">The model must decide whether to infer from history or ask a</text>
<text x="772" y="385" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">clarification question.</text>
<rect x="680" y="440" width="540" height="118" rx="24" fill="#ffffff" stroke="#e4e7ec" filter="url(#shadow)"/>
<circle cx="728" cy="499" r="28" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="728" y="508" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#2563eb">3</text>
<text x="772" y="482" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="850" fill="#172033">Long-horizon consistency</text>
<text x="772" y="510" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">More history helps only if the agent can retrieve stable preferences</text>
<text x="772" y="530" font-family="Inter,Arial,sans-serif" font-size="14" fill="#667085">and ignore stale details.</text>
<rect x="680" y="585" width="540" height="50" rx="20" fill="#f8fafc" stroke="#e4e7ec"/>
<text x="710" y="616" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="750" fill="#475569">Trajectory position: First 39.6% · Mid 37.3% · Last 30.9% (avg exact)</text>
